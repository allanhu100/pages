<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Roboto', sans-serif;
        background: #121212;
        color: #f5f5f5;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        justify-content: center;
        align-items: center;
        text-align: center;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        letter-spacing: 1px;
    }

    .credits {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .credits li {
        margin: 0.5rem 0;
        font-size: 1.2rem;
        transition: color 0.3s ease, transform 0.3s ease;
    }

    .credits li a {
        text-decoration: none;
        color: #f5f5f5;
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 4px;
        transition: background 0.3s ease, color 0.3s ease, transform 0.3s ease;
    }

    .credits li a:hover {
        color: #121212;
        background: #4caf50;
        transform: translateX(5px);
    }

    footer {
        position: absolute;
        bottom: 1rem;
        font-size: 0.9rem;
        color: #888;
    }

    @media (max-width: 500px) {
        h1 {
            font-size: 2rem;
        }
        .credits li {
            font-size: 1rem;
        }
    }
</style>
</head>
<body>

<h1>Credits</h1>
<ul class="credits">
    <li><a href="https://github.com/pwa-dino/pwa-dino.github.io" target="_blank">Dino Game: pwa-dino</a></li>
    <li><a href="https://github.com/Iqbolshoh/javascript-xo-game/" target="_blank">Tic-Tac-Toe: Iqbolshoh</a></li>
    <li><a href="https://github.com/gabrielecirulli/2048" target="_blank">2048: gabrielecirulli</a></li>
    <li><a href="https://flaticon.com/" target="_blank">Misc. Webpage Icons: flaticon.com</a></li>
</ul>

<footer>&copy; Allan Hu</footer>

</body>
</html>
