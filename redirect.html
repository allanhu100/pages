<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Redirecting...</title>
<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  try {
    const res = await fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQqTIz74rTp4UAPrND29ZzRMoDgQS2HLB7FKU5m1IF0AhvvxPgn7ocyUXy9DMiGVb1_DKiePMGIVNTc/pub?output=csv');
    const csvText = await res.text();

    // Convert CSV → JSON
    const lines = csvText.trim().split('\n');
    const headers = lines.shift().split(',');
    const redirects = {};
    lines.forEach(line => {
      const row = line.split(',');
      const obj = {};
      headers.forEach((h, i) => obj[h.trim()] = row[i]?.trim());
      redirects[obj.id] = obj;
    });

    const redirect = redirects[id];
    if (redirect && (!redirect.expiry || new Date() < new Date(redirect.expiry))) {
      window.location.href = redirect.url;
    } else {
      window.location.href = '/404';
    }

  } catch (e) {
    console.error(e);
    window.location.href = '/404';
  }
})();
</script>
</head>
<body>
Redirecting...
</body>
</html>
