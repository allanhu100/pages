<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="styles/styles.css">
<title>Redirecting...</title>
<script>
(() => {
  const params = new URLSearchParams(window.location.search);
  const idParam = params.get('id');

  if (idParam) {
    window.location.href = `/r?id=${encodeURIComponent(idParam)}`;
  } else {
    document.body.textContent = "No id provided for redirect ❌";
  }
})();
</script>
</head>
<body>
<h1>Redirecting…</h1>
<div class="div"></div>
⚠️ allanhu100.github.io/redirect is deprecated and will redirect traffic to allanhu100.github.io/r
</body>
</html>
