<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/styles.css">
<link rel="shortcut icon" href="styles/source-favicon.png">
<title>Contact Info</title>
</head>

<body>

<header class="site-header">
    <a href="https://allanhu100.github.io" class="logo">🦖 Rawr</a>
    <nav class="nav-bar">
        <a href="https://allanhu100.github.io">Home</a>
        <a href="https://allanhu100.github.io/games">Games</a>
        <a href="https://allanhu100.github.io/credits">Credits</a>
    </nav>
</header>

<main class="content credits-page">
    <h1>Contact Info</h1>
    <ul class="credits" id="output">
        <li>❌ No valid data found</li>
    </ul>
</main>

<footer class="footer">&copy; Allan Hu</footer>

<script>
(function() {
    const params = new URLSearchParams(window.location.search);
    const allData = params.getAll("data");
    const output = document.getElementById("output");
    output.innerHTML = "";

    let found = false;

    for (const encoded of allData) {
        let decoded;
        try { decoded = atob(encoded); } 
        catch { continue; }

        const li = document.createElement("li");
        li.textContent = decoded;
        output.appendChild(li);
        found = true;
    }

    if (!found) {
        const li = document.createElement("li");
        li.textContent = "❌ No valid data found";
        output.appendChild(li);
    }
})();
</script>

</body>
</html>
