<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🦕 You got lost...</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: sans-serif;
    background: #ffffff;
    color: #1e1e1e;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .container {
    max-width: 600px;
  }

  .error__title {
    font-size: 15em;
    margin: 0;
    color: #e67e22;
  }

  .error__subtitle {
    font-size: 2em;
    margin: 0.5em 0;
  }

  .error__description {
    opacity: 0.7;
    margin-bottom: 2em;
  }

  .error__button {
    min-width: 7em;
    margin: 0.5em;
    padding: 0.5em 2em;
    border: 2px solid #e67e22;
    border-radius: 8em;
    background: transparent;
    color: #e67e22;
    cursor: pointer;
    font-size: 1em;
    display: inline-flex;
    align-items: center;
    gap: 0.5em;
  }

  .error__button--active {
    background-color: #e67e22;
    color: white;
  }
</style>
</head>
<body>

<div class="container">
  <div class="error__title">404</div>
  <div class="error__subtitle">Whoops!</div>
  <div class="error__description">That page doesn't exist...</div>

  <button class="error__button error__button--active" onclick="window.location.href='https://allanhu100.github.io/redirect?id=home&source=404'">
    Go To Home 
  </button>

  <button class="error__button" onclick="window.location.href='https://allanhu100.github.io/redirect?id=dino_game&source=404'">
    Play Dinosaur 🦖
  </button>
</div>

</body>
</html>
