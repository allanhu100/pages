<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/styles.css">
<link rel="shortcut icon" href="styles/404-favicon.png">
<title>404 Not Found</title>

<style>
.error-page {
    text-align: center;
    padding-top: 40px;
}

.error-code {
    font-size: 8rem;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, #ff7b00, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.error-message {
    font-size: 1.8rem;
    margin: 10px 0;
}

.error-description {
    color: #777;
    margin-bottom: 30px;
}

.error-actions {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}
</style>
</head>

<body>

<header class="site-header">
    <a href="https://allanhu100.github.io/" class="logo">🦖 Rawr</a>
    <nav class="nav-bar">
        <a href="https://allanhu100.github.io/">Home</a>
        <a href="https://allanhu100.github.io/games" class="nav-button">Games</a>
        <a href="https://allanhu100.github.io/credits" class="nav-button">Credits</a>
    </nav>
</header>

<main class="content error-page">
    <h1 class="error-code">404</h1>
    <h2 class="error-message">Page not found</h2>
    <p class="error-description">
        This page either moved, never existed, or you mistyped the URL.
    </p>

    <div class="error-actions">
        <a href="https://allanhu100.github.io/" class="button">Go Home</a>
        <a href="https://allanhu100.github.io/games" class="button">Play Games</a>
    </div>
</main>

<footer class="footer">
    &copy; Allan Hu
</footer>

</body>
</html>
