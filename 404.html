<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 Not Found</title>
<style>
body {
  height: 100%;
  width: 100%;
  margin: 0;
  background: linear-gradient(90deg, rgba(47,54,64,1) 23%, rgba(24,27,32,1) 100%);
  overflow: hidden;
}

/* Moon */
.moon {
  background: linear-gradient(90deg, rgba(208,208,208,1) 48%, rgba(145,145,145,1) 100%);
  position: absolute;
  top: -100px;
  left: -300px;
  width: 900px;
  height: 900px;
  border-radius: 100%;
  box-shadow: 0 0 30px -4px rgba(0,0,0,0.5);
}

.moon__crater {
  position: absolute;
  border-radius: 100%;
  background: linear-gradient(90deg, rgba(122,122,122,1) 38%, rgba(195,195,195,1) 100%);
  opacity: 0.6;
}

.moon__crater1 { top: 250px; left: 500px; width: 60px; height: 180px; }
.moon__crater2 { top: 650px; left: 340px; width: 40px; height: 80px; transform: rotate(55deg); }
.moon__crater3 { top: -20px; left: 40px; width: 65px; height: 120px; transform: rotate(250deg); }

/* Stars */
.star {
  background: grey;
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 100%;
  opacity: 0.4;
  animation: shimmer 1.5s infinite alternate;
}

@keyframes shimmer {
  from { opacity: 0; }
  to { opacity: 0.7; }
}

.star1 { top: 40%; left: 50%; animation-delay: 1s; }
.star2 { top: 60%; left: 90%; animation-delay: 3s; }
.star3 { top: 10%; left: 70%; animation-delay: 2s; }
.star4 { top: 90%; left: 40%; }
.star5 { top: 20%; left: 30%; animation-delay: 0.5s; }

/* Error text */
.error {
  position: absolute;
  left: 100px;
  top: 400px;
  transform: translateY(-60%);
  font-family: sans-serif;
  color: #363e49;
}

.error__title { font-size: 10em; }
.error__subtitle { font-size: 2em; }
.error__description { opacity: 0.5; }

.error__button {
  min-width: 7em;
  margin-top: 3em;
  margin-right: 0.5em;
  padding: 0.5em 2em;
  border: 2px solid #2f3640;
  background: transparent;
  border-radius: 8em;
  color: #576375;
  cursor: pointer;
}

.error__button--active {
  background-color: #e67e22;
  border-color: #e67e22;
  color: white;
}

/* Astronaut */
.astronaut {
  position: absolute;
  width: 185px;
  height: 300px;
  left: 70%;
  top: 50%;
  transform: translate(-50%, -50%) rotate(20deg) scale(1.2);
}

.astronaut__head {
  background: white;
  position: absolute;
  top: 60px;
  left: 60px;
  width: 60px;
  height: 60px;
  border-radius: 2em;
}

.astronaut__backpack {
  background: #bfbfbf;
  position: absolute;
  top: 90px;
  left: 47px;
  width: 86px;
  height: 90px;
  border-radius: 8px;
}

.astronaut__body {
  background: #e6e6e6;
  position: absolute;
  top: 115px;
  left: 55px;
  width: 70px;
  height: 80px;
  border-radius: 8px;
}

.astronaut__leg-left,
.astronaut__leg-right {
  background: #e6e6e6;
  position: absolute;
  top: 188px;
  width: 23px;
  height: 75px;
}

.astronaut__leg-left { left: 50px; transform: rotate(10deg); }
.astronaut__leg-right { left: 108px; transform: rotate(-10deg); }

/* Feet */
.astronaut__foot-left,
.astronaut__foot-right {
  background: white;
  position: absolute;
  top: 240px;
  width: 28px;
  height: 20px;
  border-bottom: 4px solid #e67e22;
}

.astronaut__foot-left { left: 43px; transform: rotate(10deg); }
.astronaut__foot-right { left: 111px; transform: rotate(-10deg); }

</style>
</head>

<body>

<div class="moon"></div>
<div class="moon__crater moon__crater1"></div>
<div class="moon__crater moon__crater2"></div>
<div class="moon__crater moon__crater3"></div>

<div class="star star1"></div>
<div class="star star2"></div>
<div class="star star3"></div>
<div class="star star4"></div>
<div class="star star5"></div>

<div class="error">
  <div class="error__title">404</div>
  <div class="error__subtitle">Whoops!</div>
  <div class="error__description">It looks like you were redirected nowhere</div>

  <button class="error__button error__button--active"
    onclick="window.location.href='https://allanhu100.github.io'">
    Go To Home
  </button>

  <button class="error__button"
    onclick="window.location.href='https://allanhu100.github.io/dinosaur-game'">
    Play Dinosaur
  </button>
</div>

<div class="astronaut">
  <canvas id="cord" width="500" height="500"></canvas>
  <canvas id="visor" width="60" height="60"></canvas>
</div>

<script>
function drawVisor() {
  const canvas = document.getElementById('visor');
  const ctx = canvas.getContext('2d');

  ctx.beginPath();
  ctx.moveTo(5, 45);
  ctx.bezierCurveTo(15, 64, 45, 64, 55, 45);
  ctx.lineTo(55, 20);
  ctx.bezierCurveTo(55, 15, 50, 10, 45, 10);
  ctx.lineTo(15, 10);
  ctx.bezierCurveTo(15, 10, 5, 10, 5, 20);
  ctx.lineTo(5, 45);

  ctx.fillStyle = '#2f3640';
  ctx.fill();
  ctx.strokeStyle = '#f5f6fa';
  ctx.stroke();
}

const cordCanvas = document.getElementById('cord');
const ctx = cordCanvas.getContext('2d');

let y1 = 160, y2 = 100, y3 = 100;
let y1Forward = true, y2Forward = false, y3Forward = true;

function animate() {
  requestAnimationFrame(animate);
  ctx.clearRect(0, 0, cordCanvas.width, cordCanvas.height);

  ctx.beginPath();
  ctx.moveTo(130, 170);
  ctx.bezierCurveTo(250, y1, 345, y2, 400, y3);

  ctx.strokeStyle = 'white';
  ctx.lineWidth = 8;
  ctx.stroke();

  if (y1 >= 300 || y1 <= 100) y1Forward = !y1Forward;
  if (y2 >= 310 || y2 <= 100) y2Forward = !y2Forward;
  if (y3 >= 317 || y3 <= 100) y3Forward = !y3Forward;

  y1 += y1Forward ? 1 : -1;
  y2 += y2Forward ? 1 : -1;
  y3 += y3Forward ? 1 : -1;
}

drawVisor();
animate();
</script>

</body>
</html>
