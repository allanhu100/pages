<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚠️ Testing Playground</title>
<style>
    body {
        text-align: center;
        font-family: Arial, sans-serif;
        margin: 50px;
        background-color: #f5f5f5;
    }
    header {
        font-size: 2em;
        font-weight: bold;
        margin-bottom: 30px;
    }
    img {
        max-width: 100%;
        height: auto;
    }

    /* Banner styles */
    .notifications-container {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 320px;
        z-index: 1000;
        font-family: Arial, sans-serif;
    }

    .alert {
        background-color: #fff8c5;
        border-left: 5px solid #facc15;
        padding: 10px 15px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        border-radius: 5px;
        display: flex;
        align-items: center; /* Centers icon vertically */
        gap: 10px;
    }

    .alert svg {
        width: 20px;
        height: 20px;
        flex-shrink: 0;
        color: #f59e0b;
    }

    .alert-prompt-wrap {
        text-align: left;
        font-size: 14px;
        color: #78350f;
    }

    .alert-prompt-wrap a {
        display: inline-block;
        margin-top: 5px;
        color: #1d4ed8;
        text-decoration: underline;
    }
</style>
</head>
<body>
<header>Dinosaur 🦖</header>
<p>Rawr</p>
<img src="https://github.com/user-attachments/assets/a84ef3ad-5890-4d51-98a5-f3c5c329608d" alt="Dinosaur">

<div class="notifications-container">
    <div class="alert">
        <svg aria-hidden="true" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path clip-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" fill-rule="evenodd"></path>
        </svg>
        <div class="alert-prompt-wrap">
            <p>This is a testing page. Page functionality may vary.</p>
            <a href="https://allanhu100.github.io/home">Go back to Home Page</a>
        </div>
    </div>
</div>

</body>
</html>
