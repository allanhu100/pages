<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PIN Protected Page</title>
  <style>
    .input { display: flex; flex-direction: column; width: fit-content; }
    label { margin-bottom: 5px; font-weight: bold; color: #1D4ED8; }
    input { padding: 8px; border: 2px solid #1D4ED8; border-radius: 5px; width: 200px; }
    button { margin-top: 10px; padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>

<div id="gate">
  <div class="input">
    <label for="password">CONFIRM YOUR IDENTITY:</label>
    <input id="password" type="password" placeholder="Enter your PIN..." />
    <button onclick="checkPin()">Submit</button>
  </div>
</div>

<div id="content" style="display:none;">
  <h1>Welcome!</h1>
  <p>You successfully entered the correct PIN.</p>
</div>

<script>
async function hash(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, '0'))
    .join('');
}

// SHA-256 hashes of 2170 and 3AEB
const validHashes = [
  "c0f2c1691488c8d2fc6f1d6fa6b019b7f0f3fbe3f7f1b6ce1380bb214e41b983",
  "3e2017e0c4b40eaa01f49d0dfbb446ae7d8e0a611f96c3a780a1e1fc6a7683e6"
];

async function checkPin() {
  const input = document.getElementById("password").value;
  const hashed = await hash(input);

  if (validHashes.includes(hashed)) {
    document.getElementById("gate").style.display = "none";
    document.getElementById("content").style.display = "block";
  } else {
    alert("Invalid PIN ❌");
  }
}
</script>

</body>
</html>
